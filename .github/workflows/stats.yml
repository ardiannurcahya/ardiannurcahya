name: Refresh GitHub Stats

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/generate-stats.mjs"
      - ".github/workflows/stats.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-profile-stats
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v5

      - name: Generate repository-owned stats cards
        run: node .github/scripts/generate-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_STATS_USERNAME: ardiannurcahya

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/github-languages.svg
          git diff --cached --quiet || git commit -m "chore: refresh GitHub profile stats"
          git push
